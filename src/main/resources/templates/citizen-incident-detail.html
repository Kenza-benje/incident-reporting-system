<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Incident Detail | Alertify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { background: linear-gradient(180deg,#f7f9fc 0%,#edf3f9 100%); min-height:100vh; }
        #detailMap { height: 260px; border-radius: 0.5rem; }
        .timeline-dot { width:12px; height:12px; border-radius:50%; background:#0d6efd; flex-shrink:0; margin-top:4px; }
        .timeline-dot.done { background:#198754; }
        .timeline-line { width:2px; background:#dee2e6; flex-shrink:0; margin:0 5px; }
    </style>
</head>
<body>
<div class="container py-4">

    <!-- Error state -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${incident != null}">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h1 class="h3 mb-0" th:text="'Incident #INC-' + ${incident.id}">Incident</h1>
                <span class="text-muted small" th:text="${incident.categoryDisplayName}"></span>
            </div>
            <a class="btn btn-outline-secondary btn-sm" href="/citizen/my-reports">Back to My Reports</a>
        </div>

        <div class="row g-3">
            <!-- Left: Incident details -->
            <div class="col-lg-7">
                <div class="card border-0 shadow-sm mb-3">
                    <div class="card-body">
                        <h2 class="h5 mb-3">Incident Information</h2>
                        <dl class="row mb-0">
                            <dt class="col-sm-4">Reference</dt>
                            <dd class="col-sm-8 fw-semibold text-primary"
                                th:text="'INC-' + ${incident.id}"></dd>

                            <dt class="col-sm-4">Category</dt>
                            <dd class="col-sm-8" th:text="${incident.categoryDisplayName}"></dd>

                            <dt class="col-sm-4">Urgency</dt>
                            <dd class="col-sm-8">
                                <span class="badge"
                                      th:text="${incident.urgencyDisplayName}"
                                      th:classappend="${incident.urgencyLevel != null and incident.urgencyLevel.name() == 'HIGH'}   ? 'bg-danger'   :
                                                     (${incident.urgencyLevel != null and incident.urgencyLevel.name() == 'MEDIUM'} ? 'bg-warning text-dark' :
                                                      'bg-success')">High</span>
                            </dd>

                            <dt class="col-sm-4">Status</dt>
                            <dd class="col-sm-8">
                                <span class="badge"
                                      th:text="${incident.statusDisplayName}"
                                      th:classappend="${incident.status.name() == 'RESOLVED'}    ? 'bg-success'   :
                                                     (${incident.status.name() == 'REJECTED'}    ? 'bg-danger'    :
                                                     (${incident.status.name() == 'IN_PROGRESS'} ? 'bg-warning text-dark' :
                                                     (${incident.status.name() == 'ASSIGNED'}    ? 'bg-purple'    :
                                                      'bg-secondary')))">Submitted</span>
                            </dd>

                            <dt class="col-sm-4">Submitted</dt>
                            <dd class="col-sm-8"
                                th:text="${#temporals.format(incident.createdAt, 'yyyy-MM-dd HH:mm')}"></dd>

                            <dt class="col-sm-4" th:if="${incident.resolvedAt != null}">Resolved</dt>
                            <dd class="col-sm-8" th:if="${incident.resolvedAt != null}"
                                th:text="${#temporals.format(incident.resolvedAt, 'yyyy-MM-dd HH:mm')}"></dd>

                            <dt class="col-sm-4">Location</dt>
                            <dd class="col-sm-8"
                                th:text="${incident.locationDescription != null and !#strings.isEmpty(incident.locationDescription)}
                                          ? incident.locationDescription
                                          : (#numbers.formatDecimal(incident.latitude,1,5) + ', ' + #numbers.formatDecimal(incident.longitude,1,5))">
                            </dd>

                            <dt class="col-sm-4" th:if="${incident.assignedDepartment != null}">Department</dt>
                            <dd class="col-sm-8" th:if="${incident.assignedDepartment != null}"
                                th:text="${incident.assignedDepartment}"></dd>
                        </dl>
                        <div class="mt-3">
                            <p class="fw-semibold mb-1">Description</p>
                            <p class="text-secondary mb-0" th:text="${incident.description}"></p>
                        </div>
                        <div class="mt-3" th:if="${incident.resolutionNotes != null}">
                            <p class="fw-semibold text-success mb-1">Resolution Notes</p>
                            <p class="text-secondary mb-0" th:text="${incident.resolutionNotes}"></p>
                        </div>
                        <div class="mt-3" th:if="${incident.reviewNotes != null}">
                            <p class="fw-semibold mb-1">Authority Notes</p>
                            <p class="text-secondary mb-0" th:text="${incident.reviewNotes}"></p>
                        </div>
                    </div>
                </div>

                <!-- Photo Evidence -->
                <div class="card border-0 shadow-sm mb-3"
                     th:if="${(incident.photoUrls != null and !#lists.isEmpty(incident.photoUrls)) or incident.photoUrl != null}">
                    <div class="card-body">
                        <h2 class="h5 mb-3">Uploaded Evidence</h2>
                        <div class="row g-2">
                            <!-- Multiple photos via photoUrls list -->
                            <div class="col-6 col-md-4"
                                 th:each="pUrl : ${incident.photoUrls}"
                                 th:if="${incident.photoUrls != null and !#lists.isEmpty(incident.photoUrls)}">
                                <a th:href="${pUrl}" target="_blank" rel="noopener">
                                    <img th:src="${pUrl}"
                                         class="img-fluid rounded shadow-sm"
                                         style="height:160px;object-fit:cover;width:100%;"
                                         alt="Evidence photo"
                                         onerror="this.parentElement.innerHTML='<span class=text-muted>Photo unavailable</span>'">
                                </a>
                            </div>
                            <!-- Legacy single photoUrl fallback -->
                            <div class="col-6 col-md-4"
                                 th:if="${(incident.photoUrls == null or #lists.isEmpty(incident.photoUrls)) and incident.photoUrl != null}">
                                <a th:href="${incident.photoUrl}" target="_blank" rel="noopener">
                                    <img th:src="${incident.photoUrl}"
                                         class="img-fluid rounded shadow-sm"
                                         style="height:160px;object-fit:cover;width:100%;"
                                         alt="Evidence photo">
                                </a>
                            </div>
                        </div>

                        <!-- After-resolution proof -->
                        <div class="mt-3" th:if="${incident.afterPhotoUrl != null}">
                            <p class="fw-semibold text-success mb-2">Resolution Proof</p>
                            <a th:href="${incident.afterPhotoUrl}" target="_blank">
                                <img th:src="${incident.afterPhotoUrl}"
                                     class="img-fluid rounded"
                                     style="max-height:200px;border:2px solid #198754;"
                                     alt="Resolution proof">
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Map -->
                <div class="card border-0 shadow-sm"
                     th:if="${incident.latitude != null and incident.longitude != null}">
                    <div class="card-body">
                        <h2 class="h5 mb-3">Location</h2>
                        <div id="detailMap"></div>
                    </div>
                </div>
            </div>

            <!-- Right: Timeline -->
            <div class="col-lg-5">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <h2 class="h5 mb-3">Status Timeline</h2>
                        <!-- Status pipeline using IncidentStatus workflow order -->
                        <ul class="list-unstyled mb-0">
                            <li th:each="step, stat : ${ {'SUBMITTED','UNDER_REVIEW','ASSIGNED','IN_PROGRESS','RESOLVED'} }"
                                class="d-flex gap-2 mb-3">
                                <div>
                                    <div class="rounded-circle d-flex align-items-center justify-content-center"
                                         style="width:28px;height:28px;font-size:.8rem;"
                                         th:classappend="${incident.status.name() == step or
                                                          (step == 'SUBMITTED' and #strings.length(incident.status.name()) > 0)} ? 'bg-primary text-white' : 'bg-light text-muted border'">
                                        <span th:text="${stat.index + 1}">1</span>
                                    </div>
                                </div>
                                <div>
                                    <p class="mb-0 fw-semibold"
                                       th:text="${step == 'SUBMITTED'}    ? 'Submitted'    :
                                                (${step == 'UNDER_REVIEW'}? 'Under Review'  :
                                                (${step == 'ASSIGNED'}    ? 'Assigned'      :
                                                (${step == 'IN_PROGRESS'} ? 'In Progress'   :
                                                 'Resolved')))">Step</p>
                                    <p class="text-muted small mb-0"
                                       th:text="${incident.status.name() == step} ? 'Current status' :
                                                (${step == 'SUBMITTED'} ? #temporals.format(incident.createdAt,'yyyy-MM-dd HH:mm') : '')">
                                    </p>
                                </div>
                            </li>
                        </ul>

                        <div th:if="${incident.status.name() == 'REJECTED'}"
                             class="alert alert-danger mt-3 mb-0">
                            <strong>Rejected</strong>
                            <p class="small mb-0" th:if="${incident.reviewNotes != null}"
                               th:text="${incident.reviewNotes}"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:if="${incident != null and incident.latitude != null}">
    const lat = [[${incident.latitude}]];
    const lng = [[${incident.longitude}]];
    const map = L.map('detailMap').setView([lat, lng], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19, attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
    L.marker([lat, lng]).addTo(map)
      .bindPopup('[[${incident.categoryDisplayName}]]').openPopup();
</script>
</body>
</html>
