<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Incident Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Incident Detail</h1>
        <a class="btn btn-outline-secondary btn-sm" href="/citizen/my-reports">Back to My Reports</a>
    </div>

    <div class="row g-3">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <h2 class="h5 mb-3">Incident Information</h2>
                    <p class="mb-1"><strong>Incident ID:</strong> <span th:text="${incident.incidentId}"></span></p>
                    <p class="mb-1"><strong>Category:</strong> <span th:text="${incident.category.label}"></span></p>
                    <p class="mb-1"><strong>Status:</strong> <span class="badge text-bg-secondary" th:text="${incident.status.label}"></span></p>
                    <p class="mb-1"><strong>Submission Date:</strong> <span th:text="${#temporals.format(incident.submittedAt, 'yyyy-MM-dd HH:mm')}"></span></p>
                    <p class="mb-3"><strong>Location:</strong>
                        <span th:text="|${#numbers.formatDecimal(incident.latitude,1,5)}, ${#numbers.formatDecimal(incident.longitude,1,5)}|"></span>
                    </p>
                    <p class="mb-2"><strong>Description:</strong></p>
                    <p class="text-secondary" th:text="${incident.description}"></p>

                    <p class="mb-1"><strong>Uploaded Photo Names:</strong></p>
                    <ul class="mb-0">
                        <li th:each="photo : ${incident.photoNames}" th:text="${photo}"></li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="col-lg-5">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <h2 class="h5 mb-3">Lifecycle Timeline</h2>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item px-0" th:each="event : ${incident.timeline}">
                            <div class="d-flex justify-content-between">
                                <strong th:text="${event.status.label}"></strong>
                                <small class="text-secondary" th:text="${#temporals.format(event.at, 'yyyy-MM-dd HH:mm')}"></small>
                            </div>
                            <div class="small text-secondary" th:text="${event.note}"></div>
                            <div class="small">By: <span th:text="${event.updatedBy}"></span></div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
