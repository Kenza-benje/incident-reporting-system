<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Submitted Successfully | Alertify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(180deg,#f0fff4 0%,#e8f5e9 100%); min-height:100vh; }
        .check-circle { width:72px;height:72px;background:#d1fae5;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem; }
    </style>
</head>
<body class="d-flex align-items-center">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-md-5 text-center">
                    <div class="check-circle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="#16a34a"
                             viewBox="0 0 16 16">
                            <path d="M13.485 1.929a.75.75 0 0 1 .086 1.058l-7 8a.75.75 0 0 1-1.137.014l-3-3.5a.75.75 0 0 1 1.132-.986l2.44 2.848 6.421-7.328a.75.75 0 0 1 1.058-.106z"/>
                        </svg>
                    </div>

                    <h1 class="h3 text-success mb-2">Incident Submitted Successfully</h1>
                    <p class="text-muted mb-1">Your tracking reference is:</p>
                    <p class="display-5 fw-bold text-primary mb-1" th:text="${incidentId}">INC-1</p>

                    <!-- Extra detail if incident was loaded -->
                    <div th:if="${incident != null}" class="mt-2 mb-3">
                        <span class="badge bg-warning text-dark"
                              th:if="${incident.urgencyLevel != null}"
                              th:text="'Urgency: ' + ${incident.urgencyDisplayName}">High</span>
                        <p class="text-muted small mt-2 mb-0">
                            Authorities will be notified. You can track the status below.
                        </p>
                    </div>
                    <div th:if="${incident == null}" class="mb-3">
                        <p class="text-muted small">
                            Authorities have been notified. You can track the status below.
                        </p>
                    </div>

                    <div class="d-flex justify-content-center flex-wrap gap-2 mt-3">
                        <a class="btn btn-primary"
                           th:href="@{/citizen/incidents/{id}(id=${incidentId})}">View Incident Detail</a>
                        <a class="btn btn-outline-primary" href="/citizen/my-reports">My Reports</a>
                        <a class="btn btn-outline-secondary" href="/">Back Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
