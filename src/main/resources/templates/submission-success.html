<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Submission Success</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-md-5 text-center">
                    <h1 class="h3 text-success mb-3">Incident Submitted Successfully</h1>
                    <p class="mb-2">Your tracking reference is:</p>
                    <p class="display-6 fw-bold mb-4" th:text="${incidentId}"></p>
                    <div class="d-flex justify-content-center flex-wrap gap-2">
                        <a class="btn btn-primary" th:href="@{/citizen/incidents/{id}(id=${incidentId})}">View Incident Detail</a>
                        <a class="btn btn-outline-primary" href="/citizen/my-reports">View My Reports</a>
                        <a class="btn btn-outline-secondary" href="/">Back Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
