<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Reports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">My Reports</h1>
        <a class="btn btn-outline-secondary btn-sm" href="/">Back Home</a>
    </div>

    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
            <form method="get" action="/citizen/my-reports" class="row g-2 align-items-end">
                <div class="col-md-8">
                    <label for="userId" class="form-label">Authenticated User ID</label>
                    <input id="userId" name="userId" class="form-control" placeholder="Enter user id to load your reports" th:value="${userId}">
                </div>
                <div class="col-md-4">
                    <button class="btn btn-primary w-100" type="submit">Load Reports</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Incident ID</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Location</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(reports)}">
                        <td colspan="6" class="text-center text-secondary py-4">
                            No reports found. Submit an incident first or provide a valid user ID.
                        </td>
                    </tr>
                    <tr th:each="report : ${reports}">
                        <td th:text="${report.incidentId}"></td>
                        <td th:text="${report.category.label}"></td>
                        <td th:text="${#temporals.format(report.submittedAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td><span class="badge text-bg-secondary" th:text="${report.status.label}"></span></td>
                        <td th:text="|${#numbers.formatDecimal(report.latitude,1,5)}, ${#numbers.formatDecimal(report.longitude,1,5)}|"></td>
                        <td>
                            <a class="btn btn-sm btn-outline-primary" th:href="@{/citizen/incidents/{id}(id=${report.incidentId})}">View</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
