<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Reports | Alertify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(180deg,#f7f9fc 0%,#edf3f9 100%); min-height:100vh; }
        .badge-SUBMITTED   { background:#6c757d!important; }
        .badge-UNDER_REVIEW{ background:#0d6efd!important; }
        .badge-ASSIGNED    { background:#6610f2!important; }
        .badge-IN_PROGRESS { background:#fd7e14!important; color:#000!important; }
        .badge-RESOLVED    { background:#198754!important; }
        .badge-REJECTED    { background:#dc3545!important; }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="h3 mb-0">My Reports</h1>
            <p class="text-muted small mb-0"
               th:if="${authenticatedUser}"
               th:text="'Showing reports for ' + ${authenticatedUser}"></p>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-success btn-sm" href="/citizen/report">+ New Report</a>
            <a class="btn btn-outline-secondary btn-sm" href="/">Back Home</a>
        </div>
    </div>

    <!-- User ID lookup — only shown when not logged in -->
    <div sec:authorize="!isAuthenticated()" class="card border-0 shadow-sm mb-3">
        <div class="card-body">
            <form method="get" action="/citizen/my-reports" class="row g-2 align-items-end">
                <div class="col-md-8">
                    <label for="userId" class="form-label">Your email address</label>
                    <input id="userId" name="userId" type="email" class="form-control"
                           placeholder="Enter the email you used to submit reports"
                           th:value="${userId}">
                </div>
                <div class="col-md-4">
                    <button class="btn btn-primary w-100" type="submit">Load Reports</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Reference</th>
                        <th>Category</th>
                        <th>Submitted</th>
                        <th>Urgency</th>
                        <th>Status</th>
                        <th>Location</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(reports)}">
                        <td colspan="7" class="text-center text-secondary py-5">
                            No reports found.
                            <a href="/citizen/report" class="fw-semibold">Submit your first incident report.</a>
                        </td>
                    </tr>
                    <tr th:each="report : ${reports}">
                        <!-- Real IncidentResponse fields -->
                        <td class="fw-semibold text-primary"
                            th:text="'INC-' + ${report.id}">INC-1</td>
                        <td th:text="${report.categoryDisplayName}">Wildfire</td>
                        <td th:text="${#temporals.format(report.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</td>
                        <td>
                            <span class="badge"
                                  th:text="${report.urgencyDisplayName}"
                                  th:classappend="${report.urgencyLevel != null and report.urgencyLevel.name() == 'HIGH'}   ? ' bg-danger'   :
                                                 (${report.urgencyLevel != null and report.urgencyLevel.name() == 'MEDIUM'} ? ' bg-warning text-dark' :
                                                  ' bg-success')">Medium</span>
                        </td>
                        <td>
                            <span class="badge"
                                  th:text="${report.statusDisplayName}"
                                  th:classappend="' badge-' + ${report.status.name()}">Submitted</span>
                        </td>
                        <td class="text-muted small"
                            th:text="${report.locationDescription != null and !#strings.isEmpty(report.locationDescription)}
                                      ? report.locationDescription
                                      : (#numbers.formatDecimal(report.latitude,1,4) + ', ' + #numbers.formatDecimal(report.longitude,1,4))">
                        </td>
                        <td>
                            <a class="btn btn-sm btn-outline-primary"
                               th:href="@{/citizen/incidents/{id}(id='INC-' + ${report.id})}">View</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
