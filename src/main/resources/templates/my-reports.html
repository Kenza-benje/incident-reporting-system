<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reports | Alertify</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(180deg, #f4f7ff 0%, #eef4ff 100%);
            min-height: 100vh;
            color: #102a5c;
        }

        .page-card {
            border: 0;
            border-radius: 22px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }

        .table thead th {
            background: #f1f5ff;
            color: #41578f;
            font-size: 0.85rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border-bottom: 0;
            padding: 1rem;
        }

        .table tbody td {
            padding: 1rem;
            vertical-align: middle;
            color: #102a5c;
        }

        .ref {
            font-weight: 800;
            color: #123caa;
        }

        .badge-soft {
            border-radius: 999px;
            padding: 0.45rem 0.8rem;
            font-weight: 700;
        }

        .badge-status {
            background: #eef2ff;
            color: #1d4ed8;
            border: 1px solid #c7d2fe;
        }

        .badge-urgency {
            background: #fff7ed;
            color: #b45309;
            border: 1px solid #fed7aa;
        }

        .empty-box {
            border: 1px dashed #cbd5e1;
            border-radius: 18px;
            background: #ffffff;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <h1 class="fw-bold mb-1">My Reports</h1>
            <p class="text-muted mb-0">
                Track the incidents you submitted.
            </p>
        </div>

        <div class="d-flex gap-2">
            <a class="btn btn-primary" th:href="@{/citizen/report}">
                + New Report
            </a>
            <a class="btn btn-outline-secondary" th:href="@{/}">
                Back Home
            </a>
        </div>
    </div>

    <div class="card page-card">

        <div class="card-header bg-white py-3 px-4 d-flex justify-content-between align-items-center">
            <h2 class="h5 mb-0 fw-bold">Submitted Reports</h2>
            <span class="text-muted small"
                  th:text="'Total: ' + ${#lists.size(reports)}">
                Total: 0
            </span>
        </div>

        <div class="card-body p-0">

            <div th:if="${#lists.isEmpty(reports)}" class="empty-box m-4 p-5 text-center">
                <h5 class="fw-bold">No reports found</h5>
                <p class="text-muted">You have not submitted any reports yet.</p>
                <a class="btn btn-primary" th:href="@{/citizen/report}">
                    Submit a Report
                </a>
            </div>

            <div th:if="${!#lists.isEmpty(reports)}" class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                    <tr>
                        <th>Reference</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Urgency</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Location</th>
                        <th>Action</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="report : ${reports}">
                        <td>
                            <span class="ref" th:text="'INC-' + ${report.id}">INC-1</span>
                        </td>

                        <td th:text="${report.title != null ? report.title : 'No title'}">
                            Title
                        </td>

                        <td th:text="${report.categoryDisplayName != null ? report.categoryDisplayName : 'N/A'}">
                            Category
                        </td>

                        <td>
                            <span class="badge-soft badge-urgency"
                                  th:text="${report.urgencyDisplayName != null ? report.urgencyDisplayName : 'N/A'}">
                                Urgency
                            </span>
                        </td>

                        <td>
                            <span class="badge-soft badge-status"
                                  th:text="${report.statusDisplayName != null ? report.statusDisplayName : 'N/A'}">
                                Status
                            </span>
                        </td>

                        <td th:text="${report.createdAt != null ? #temporals.format(report.createdAt, 'yyyy-MM-dd HH:mm') : 'N/A'}">
                            Date
                        </td>

                        <td th:text="${report.locationDescription != null ? report.locationDescription : 'No location'}">
                            Location
                        </td>

                        <td>
                            <a class="btn btn-sm btn-outline-primary"
                               th:href="@{/citizen/incidents/{id}(id=${report.id})}">
                                View
                            </a>
                        </td>
                    </tr>
                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

</body>
</html>
