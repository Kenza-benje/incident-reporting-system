<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Incident Reporting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="/">Incident Reporting</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" href="/citizen/my-reports">My Reports</a>
            <a class="btn btn-light btn-sm" href="/authority/dashboard">Authority Dashboard</a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-md-5">
                    <h1 class="display-6 fw-semibold mb-3">Report Environmental & Public-Safety Incidents</h1>
                    <p class="text-secondary mb-4">
                        Help local authorities respond quickly by submitting incidents with location and photo evidence.
                    </p>
                    <div class="d-flex flex-wrap gap-2">
                        <a class="btn btn-success btn-lg" href="/citizen/report">Submit New Incident</a>
                        <a class="btn btn-outline-primary btn-lg" href="/citizen/my-reports">Track My Reports</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
