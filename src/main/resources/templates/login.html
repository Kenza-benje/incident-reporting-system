<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Incident Reporting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #eef6ff 0%, #f5fff7 100%);
        }

        .login-card {
            border: 0;
            border-radius: 1rem;
            box-shadow: 0 1rem 2rem rgba(0, 0, 0, 0.08);
        }

        .role-card {
            border: 1px solid #d9e2ef;
            border-radius: 0.75rem;
            padding: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .role-card:hover {
            border-color: #91b6ff;
            background-color: #f8fbff;
        }

        .role-card.active {
            border-color: #0d6efd;
            background-color: #eef4ff;
        }
    </style>
</head>
<body class="d-flex align-items-center">
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-9 col-xl-8">
            <div class="card login-card">
                <div class="card-body p-4 p-md-5">
                    <div class="d-flex justify-content-between align-items-start mb-4">
                        <div>
                            <h1 class="h3 mb-2">Sign In</h1>
                            <p class="text-secondary mb-0">Access citizen services or authority workspace.</p>
                        </div>
                        <a href="/" class="btn btn-outline-secondary btn-sm">Back Home</a>
                    </div>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                    <form method="post" action="/login" class="row g-3" id="loginForm">
                        <div class="col-12">
                            <label class="form-label fw-semibold d-block mb-2">Login As</label>
                            <div class="row g-2">
                                <div class="col-md-6">
                                    <label class="role-card w-100" id="citizenRoleCard">
                                        <input class="form-check-input me-2" type="radio" name="role" value="CITIZEN"
                                               th:checked="${selectedRole == 'CITIZEN'}">
                                        <span class="fw-semibold">Citizen User</span>
                                        <div class="text-secondary small mt-1">Submit incidents and track your reports.</div>
                                    </label>
                                </div>
                                <div class="col-md-6">
                                    <label class="role-card w-100" id="authorityRoleCard">
                                        <input class="form-check-input me-2" type="radio" name="role" value="AUTHORITY"
                                               th:checked="${selectedRole == 'AUTHORITY'}">
                                        <span class="fw-semibold">Authority Staff</span>
                                        <div class="text-secondary small mt-1">Review, verify, assign, and resolve incidents.</div>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label for="email" class="form-label">Email</label>
                            <input id="email" name="email" type="email" class="form-control" placeholder="name@email.com" required>
                        </div>
                        <div class="col-md-6">
                            <label for="password" class="form-label">Password</label>
                            <input id="password" name="password" type="password" class="form-control" placeholder="Enter password" required>
                        </div>
                        <div class="col-12 d-flex align-items-center justify-content-between">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label text-secondary" for="rememberMe">
                                    Remember me
                                </label>
                            </div>
                            <a href="#" class="small text-decoration-none">Forgot password?</a>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary w-100 py-2">Continue</button>
                        </div>
                    </form>

                    <p class="mt-3 mb-0 text-secondary">
                        New citizen user?
                        <a href="/signup" class="text-decoration-none fw-semibold">Create an account</a>
                    </p>

                    <p class="small text-secondary mt-4 mb-0">
                        This login screen is integrated for UI workflow now. Authentication rules can be connected to your core backend service next.
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const citizenCard = document.getElementById("citizenRoleCard");
    const authorityCard = document.getElementById("authorityRoleCard");
    const radioButtons = document.querySelectorAll('input[name="role"]');

    function refreshRoleStyles() {
        citizenCard.classList.remove("active");
        authorityCard.classList.remove("active");
        const selected = document.querySelector('input[name="role"]:checked');
        if (!selected) return;
        if (selected.value === "AUTHORITY") {
            authorityCard.classList.add("active");
        } else {
            citizenCard.classList.add("active");
        }
    }

    radioButtons.forEach(radio => radio.addEventListener("change", refreshRoleStyles));
    refreshRoleStyles();
</script>
</body>
</html>
