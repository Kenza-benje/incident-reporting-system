<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Submit Incident | Alertify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { background: linear-gradient(180deg,#f7f9fc 0%,#edf3f9 100%); min-height:100vh; }
        #map { height: 320px; border-radius: 0.5rem; }
        .photo-list { font-size:0.9rem; list-style:none; padding:0; }
        .photo-list li { padding:2px 0; color:#555; }
    </style>
</head>
<body>
<nav class="navbar bg-white border-bottom px-3 py-2 mb-4">
    <a class="navbar-brand fw-semibold" href="/">Alertify</a>
    <div class="d-flex gap-2 ms-auto">
        <a sec:authorize="isAuthenticated()" href="/citizen/my-reports"
           class="btn btn-outline-secondary btn-sm">My Reports</a>
        <a sec:authorize="isAuthenticated()" href="/logout"
           class="btn btn-outline-danger btn-sm">Logout</a>
        <a sec:authorize="!isAuthenticated()" href="/login"
           class="btn btn-outline-primary btn-sm">Login</a>
    </div>
</nav>

<div class="container pb-5">
    <div class="mb-4">
        <h1 class="h3 mb-1">Submit Incident Report</h1>
        <p class="text-muted mb-0">Report an environmental or public-safety incident in Ifrane.</p>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <div id="messageBox" class="alert d-none mb-3" role="alert"></div>

            <form id="incidentForm">
                <div class="row g-3">
                    <!-- Category — populated from real IncidentCategory enum -->
                    <div class="col-md-6">
                        <label for="category" class="form-label fw-semibold">Category <span class="text-danger">*</span></label>
                        <select id="category" name="category" class="form-select" required>
                            <option value="">Select a category</option>
                            <!--
                                categories = com.example.ifraneguard.enums.IncidentCategory[]
                                .name()        → enum key sent to backend  (e.g. WILDFIRE)
                                .displayName   → human label in dropdown   (e.g. Wildfire)
                            -->
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.name()}"
                                    th:text="${cat.displayName}"></option>
                        </select>
                    </div>

                    <!-- Reporter mode — auto-set when logged in -->
                    <div class="col-md-6">
                        <label for="reporterMode" class="form-label fw-semibold">Reporter Mode <span class="text-danger">*</span></label>
                        <select id="reporterMode" name="reporterMode" class="form-select">
                            <option value="ANONYMOUS">Anonymous</option>
                            <option value="AUTHENTICATED"
                                    th:selected="${#authentication != null and #authentication.isAuthenticated()}">
                                Authenticated (Linked to your account)
                            </option>
                        </select>
                    </div>

                    <!-- User ID — auto-filled when logged in -->
                    <div class="col-12" id="userIdRow">
                        <label for="reporterUserId" class="form-label fw-semibold">
                            Email / User ID
                            <span class="text-muted fw-normal small">(required for authenticated mode)</span>
                        </label>
                        <input id="reporterUserId" name="reporterUserId" class="form-control"
                               placeholder="your@email.com"
                               th:value="${#authentication != null and #authentication.isAuthenticated()
                                          ? #authentication.name : ''}">
                        <div class="form-text"
                             sec:authorize="isAuthenticated()">
                            Auto-filled from your logged-in account.
                        </div>
                    </div>

                    <!-- Description -->
                    <div class="col-12">
                        <label for="description" class="form-label fw-semibold">
                            Description <span class="text-danger">*</span>
                            <span class="text-muted fw-normal small">(20–1000 characters)</span>
                        </label>
                        <textarea id="description" name="description" class="form-control"
                                  rows="4" minlength="20" maxlength="1000" required
                                  placeholder="Describe the incident clearly — what you saw, when, and any relevant details."></textarea>
                        <div class="form-text"><span id="descCount">0</span>/1000</div>
                    </div>

                    <!-- Map -->
                    <div class="col-12">
                        <label class="form-label fw-semibold">
                            Location <span class="text-danger">*</span>
                            <span class="text-muted fw-normal small">(click on the map)</span>
                        </label>
                        <div id="map" class="border rounded"></div>
                        <div class="form-text mt-1" id="locationPreview">No location selected. Click the map to pin the incident.</div>
                        <input id="latitude"  name="latitude"  type="hidden">
                        <input id="longitude" name="longitude" type="hidden">
                        <input id="locationDescription" name="locationDescription" type="hidden">
                    </div>

                    <!-- Photos -->
                    <div class="col-12">
                        <label for="photos" class="form-label fw-semibold">
                            Photo Evidence <span class="text-danger">*</span>
                            <span class="text-muted fw-normal small">(1–5 images, JPG/PNG, max 10 MB each)</span>
                        </label>
                        <input id="photos" name="photos" class="form-control"
                               type="file" accept=".jpg,.jpeg,.png" multiple required>
                        <ul id="photoList" class="photo-list mt-2 mb-0"></ul>
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2">
                    <button id="submitBtn" class="btn btn-success px-4" type="submit">
                        Submit Incident
                    </button>
                    <button class="btn btn-outline-secondary" type="reset"
                            onclick="document.getElementById('photoList').innerHTML='';
                                     document.getElementById('locationPreview').textContent='No location selected.';
                                     document.getElementById('messageBox').className='alert d-none';">
                        Reset
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/report-incident.js"></script>
<script>
    // Character counter for description
    document.getElementById('description').addEventListener('input', function() {
        document.getElementById('descCount').textContent = this.value.length;
    });
    // Toggle userIdRow visibility based on reporter mode
    const modeSelect = document.getElementById('reporterMode');
    const userIdRow  = document.getElementById('userIdRow');
    function syncUserIdVisibility() {
        userIdRow.style.display = modeSelect.value === 'AUTHENTICATED' ? '' : 'none';
    }
    modeSelect.addEventListener('change', syncUserIdVisibility);
    syncUserIdVisibility();
</script>
</body>
</html>
