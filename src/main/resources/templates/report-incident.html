<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Submit Incident</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        #map { height: 320px; border-radius: 0.5rem; }
        .photo-list { font-size: 0.9rem; }
    </style>
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Submit Incident Report</h1>
        <a href="/" class="btn btn-outline-secondary btn-sm">Back Home</a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <div id="messageBox" class="alert d-none" role="alert"></div>

            <form id="incidentForm">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="category" class="form-label">Category *</label>
                        <select id="category" name="category" class="form-select" required>
                            <option value="">Select one category</option>
                            <option th:each="category : ${categories}"
                                    th:value="${category.name()}"
                                    th:text="${category.label}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="reporterMode" class="form-label">Reporter Mode *</label>
                        <select id="reporterMode" name="reporterMode" class="form-select" required>
                            <option value="ANONYMOUS">Anonymous</option>
                            <option value="AUTHENTICATED">Authenticated User</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label for="reporterUserId" class="form-label">User ID (required only for authenticated mode)</label>
                        <input id="reporterUserId" name="reporterUserId" class="form-control" placeholder="e.g. user-123">
                    </div>

                    <div class="col-12">
                        <label for="description" class="form-label">Description * (20 to 1000 chars)</label>
                        <textarea id="description" name="description" class="form-control" rows="4" minlength="20" maxlength="1000" required></textarea>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Location * (click on map)</label>
                        <div id="map"></div>
                        <div class="mt-2 text-secondary small" id="locationPreview">No location selected.</div>
                        <input id="latitude" name="latitude" type="hidden">
                        <input id="longitude" name="longitude" type="hidden">
                    </div>

                    <div class="col-12">
                        <label for="photos" class="form-label">Photo Evidence * (1 to 5 images, JPG/JPEG/PNG, max 10MB each)</label>
                        <input id="photos" name="photos" class="form-control" type="file" accept=".jpg,.jpeg,.png" multiple required>
                        <ul id="photoList" class="photo-list mt-2 mb-0"></ul>
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2">
                    <button id="submitBtn" class="btn btn-success" type="submit">Submit Incident</button>
                    <button class="btn btn-outline-secondary" type="reset">Reset</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/report-incident.js"></script>
</body>
</html>
