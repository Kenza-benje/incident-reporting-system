spring.application.name=IfraneGuard
spring.profiles.active=demo
spring.datasource.url=jdbc:postgresql://localhost:5432/ifrane_sentinel
spring.datasource.username=postgres
spring.datasource.password=Ayesha159.
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# create-drop: Hibernate DROPS all tables on shutdown and CREATES them fresh on startup.
# This guarantees the schema matches the entity definitions exactly.
# Switch to "update" only after the schema is stable and you have real data to keep.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── File upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/incidents

# ── Blur detection threshold ──────────────────────────────────────────────────
# Laplacian variance below this = flagged as blurry (warning only, not rejected).
# <20=very blurry, 20-80=blurry, 80-200=acceptable, >200=sharp
app.blur.threshold=80.0

# ── JWT ───────────────────────────────────────────────────────────────────────
application.security.jwt.secret-key=${JWT_SECRET:6A576D5A7134743777397A24432646294A404E635266556A586E3272357538783F4128472B4B6250655368566B5970337336763979244226452948404D63516654}
application.security.jwt.expiration=86400000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.example=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

server.port=8080
