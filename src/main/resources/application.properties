spring.application.name=IfraneGuard
spring.profiles.active=demo

# ── PostgreSQL ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/ifrane_sentinel
spring.datasource.username=postgres
spring.datasource.password=Ayesha159.
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── File Upload ────────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/incidents

# ── JWT ────────────────────────────────────────────────────────────────────────
# Secret must be Base64-encoded and at least 256 bits (32 bytes) for HS256
# Generate a new one with: openssl rand -base64 64
application.security.jwt.secret-key=${JWT_SECRET:6A576D5A7134743777397A24432646294A404E635266556A586E3272357538783F4128472B4B6250655368566B5970337336763979244226452948404D63516654}
# 24 hours in milliseconds
application.security.jwt.expiration=86400000

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.com.example=DEBUG
logging.level.org.springframework.security=INFO

# ── Server ─────────────────────────────────────────────────────────────────────
server.port=8080

# ── Thymeleaf ──────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
