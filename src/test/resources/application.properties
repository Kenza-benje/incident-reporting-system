# Test configuration — prevents the Spring context test from requiring a live PostgreSQL instance.
# Without this, `./gradlew test` fails immediately with "Connection refused" if no DB is running.

# Disable DataSource auto-configuration so the context loads without a real DB
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

# Suppress JPA-related startup warnings
spring.jpa.hibernate.ddl-auto=none

# Disable scheduling so EscalationSchedulerService doesn't fire during tests
spring.task.scheduling.enabled=false

# Use a dummy JWT secret for tests
application.security.jwt.secret-key=6A576D5A7134743777397A24432646294A404E635266556A586E3272357538783F4128472B4B6250655368566B5970337336763979244226452948404D63516654
application.security.jwt.expiration=86400000

# Silence most logs during tests
logging.level.root=WARN
logging.level.com.example=WARN
